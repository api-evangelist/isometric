      - in: path
        name: project_id
        required: true
        schema:
          $ref: '#/components/schemas/IsometricIDPathParam_Project_'
      - in: path
        name: id
        required: true
        schema:
          anyOf:
          - $ref: '#/components/schemas/IsometricIDPathParam_MonitoringRequirement_'
